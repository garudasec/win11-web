<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Try Windows 11</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="taskbar">
        <img src="taskbar.png" alt="Taskbar" />
        <!-- Invisible box placed exactly over the Windows icon -->
        <div class="win-hit-zone"></div>
    </div>

    <div class="startmenu">
        <div class="startmenu-top">
            <img src="startmenu_top.png" alt="Start Menu" />
        </div>
        <div class="startmenu-bottom">
            <img src="startmenu_bottom.png" alt="User bar" />
        </div>
    </div>

    <video autoplay muted id="vid" poster="bg.jpeg">
        <source src="video.webm" type="video/webm" />
    </video>

<script src="script.js"></script>
</body>

</html>
